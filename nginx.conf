server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: client-side routes (/job/:id, /history) resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API + SSE to the backend service. SSE needs buffering OFF so events
  # stream to the browser as they arrive.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }
}

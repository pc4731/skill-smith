name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (backend + frontend)
        run: npm run typecheck

      - name: Build (frontend bundle)
        run: npm run build

      # Tests mock the claude CLI (SKILL_SMITH_CLAUDE_BIN), so CI needs no API key and incurs no cost.
      - name: Test (backend + frontend)
        run: npm test
